name: "dune test"

on: 
    push:
        branches:
            - "main"

jobs:
  test:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: parser
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3.0.0
        with:
          ocaml-compiler: "5.2"
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune test
